    <section id="myproject">
      <div class="container">
        <div class="row text-center mb-3">
          <div class="col">
            <h2>Add My Project</h2>
          </div>
        </div>
        <div class="form-container">
          <div class="row justify-content-center">
            <div class="col-md-7">
              <form id="projectForm">
                <label>Project Name</label>
                <input type="text" id="projectName" required />

                <div class="date-group">
                  <div>
                    <label>Start Date</label>
                    <input type="date" id="startDate" required />
                  </div>

                  <div>
                    <label>End Date</label>
                    <input type="date" id="endDate" required />
                  </div>
                </div>

                <label>Description</label>
                <textarea id="description"></textarea>

                <label>Technologies</label>
                <div class="btn-group" role="group" aria-label="Basic checkbox toggle button group">
                  <input type="checkbox" class="btn-check" id="btncheck1" autocomplete="off" />
                  <label class="btn btn-outline-dark mx-3" for="btncheck1">Node Js</label>

                  <input type="checkbox" class="btn-check" id="btncheck2" autocomplete="off" />
                  <label class="btn btn-outline-dark mx-3" for="btncheck2">React Js</label>

                  <input type="checkbox" class="btn-check" id="btncheck3" autocomplete="off" />
                  <label class="btn btn-outline-dark mx-3" for="btncheck3">Next Js</label>

                  <input type="checkbox" class="btn-check" id="btncheck4" autocomplete="off" />
                  <label class="btn btn-outline-dark mx-3" for="btncheck4">TypeScript</label>
                </div>
                <br />
                <button type="submit" class="btn btn-primary">Submit</button>
              </form>
            </div>
          </div>
        </div>
      </div>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">

        ></path>

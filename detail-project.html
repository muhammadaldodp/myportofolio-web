<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Detail Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
      <div class="container">
        <a class="navbar-brand" href="#">Muhammad Aldo</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#home">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="project.html">My Project</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- Akhir Navbar -->

    <div class="container mt-5">
      <h2 id="detailName" class="text-center mb-4"></h2>

      <div class="row">
        <!-- Gambar -->
        <div class="col-md-6">
          <img id="detailImage" class="img-fluid" />
        </div>

        <!-- Info -->
        <div class="col-md-6">
          <h5>Duration</h5>
          <p id="detailDuration"></p>

          <h5>Technologies</h5>
          <p id="detailTech"></p>
        </div>
      </div>

      <!-- Deskripsi -->
      <div class="row mt-4">
        <div class="col">
          <p id="detailDesc"></p>
        </div>
      </div>

      <a href="project.html" class="btn btn-primary mt-3">Back</a>
    </div>

    <script>
      let projects = JSON.parse(localStorage.getItem('projects'));
      let index = localStorage.getItem('detailIndex');

      let project = projects[index];

      // Cegah error kalau data kosong
      if (!project) {
        alert('Data project tidak ditemukan!');
        window.location.href = 'project.html';
      }

      document.getElementById('detailName').innerText = project.name;
      document.getElementById('detailDuration').innerText = project.startDate + ' - ' + project.endDate;
      document.getElementById('detailDesc').innerText = project.description;
      document.getElementById('detailTech').innerText = project.technologies.join(', ');
      document.getElementById('detailImage').src = project.image;
    </script>
  </body>
</html>
